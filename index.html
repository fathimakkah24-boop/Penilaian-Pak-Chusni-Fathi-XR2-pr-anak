<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <!-- INI YANG PENTING UNTUK MOBILE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Jadwal PR Anak</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-b from-blue-200 to-white min-h-screen flex flex-col items-center p-4">

  <h1 class="text-2xl md:text-4xl font-bold text-blue-700 mb-4 text-center">
    📚 Jadwal PR Anak SD
  </h1>

  <!-- Ilustrasi -->
  <img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png"
       class="w-28 md:w-40 mb-4">

  <div class="bg-white shadow-xl rounded-2xl p-4 w-full max-w-md">

    <!-- Judul -->
    <input id="taskInput"
      class="w-full border rounded-xl px-3 py-2 mb-2 text-sm md:text-base"
      placeholder="Judul PR...">

    <!-- Deskripsi -->
    <textarea id="descInput"
      class="w-full border rounded-xl px-3 py-2 mb-2 text-sm md:text-base"
      placeholder="Deskripsi PR..."></textarea>

    <!-- Mata Pelajaran -->
    <select id="subject"
      class="w-full border rounded-xl px-3 py-2 mb-2 text-sm md:text-base">
      <option>📘 Matematika</option>
      <option>📖 Bahasa Indonesia</option>
      <option>🔬 IPA</option>
      <option>🌍 IPS</option>
      <option>🎨 Seni</option>
      <option>🏃 Olahraga</option>
    </select>

    <!-- Deadline -->
    <input type="date" id="deadline"
      class="w-full border rounded-xl px-3 py-2 mb-2 text-sm md:text-base">

    <button onclick="addTask()"
      class="w-full bg-blue-500 text-white py-2 rounded-xl text-sm md:text-base">
      Tambah PR
    </button>

    <!-- List -->
    <ul id="taskList" class="mt-4 space-y-2"></ul>

  </div>

  <p class="mt-6 text-blue-600 text-center text-sm md:text-base">
    🎉 Semangat belajar ya!
  </p>

  <p class="mt-2 text-xs md:text-sm text-gray-600 text-center">
    Dibuat oleh: <b>Fathi Ahmad - Absen 10</b>
  </p>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks") || "[]");

function getRemainingDays(deadline) {
  const today = new Date();
  const due = new Date(deadline);

  today.setHours(0,0,0,0);
  due.setHours(0,0,0,0);

  const diff = (due - today) / (1000 * 60 * 60 * 24);

  if (diff === 0) return {text: "⏰ Hari ini!", color: "text-red-600"};
  if (diff === 1) return {text: "⚠️ Besok!", color: "text-orange-500"};
  if (diff > 0) return {text: `⏳ ${diff} hari lagi`, color: "text-blue-700"};
  return {text: `❌ Terlambat ${Math.abs(diff)} hari`, color: "text-gray-500"};
}

function sortTasks() {
  tasks.sort((a, b) => new Date(a.deadline) - new Date(b.deadline));
}

function render() {
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  sortTasks();

  tasks.forEach((task, i) => {
    const remain = getRemainingDays(task.deadline);

    list.innerHTML += `
      <li class="bg-blue-100 p-3 rounded-xl text-sm md:text-base">
        <div class="flex justify-between gap-2">
          <span class="font-semibold break-words">✏️ ${task.text}</span>
          <button onclick="deleteTask(${i})">❌</button>
        </div>
        <div class="text-gray-700 mt-1 break-words">
          ${task.desc}
        </div>
        <div class="text-gray-600 mt-1">
          ${task.subject} | 📅 ${task.deadline}
        </div>
        <div class="font-semibold ${remain.color}">
          ${remain.text}
        </div>
      </li>
    `;
  });
}

function addTask() {
  const text = document.getElementById("taskInput").value;
  const desc = document.getElementById("descInput").value;
  const subject = document.getElementById("subject").value;
  const deadline = document.getElementById("deadline").value;

  if (!text || !deadline) {
    alert("Isi judul PR dan deadline dulu ya!");
    return;
  }

  tasks.push({ text, desc, subject, deadline });
  save();

  document.getElementById("taskInput").value = "";
  document.getElementById("descInput").value = "";
}

function deleteTask(i) {
  tasks.splice(i, 1);
  save();
}

function save() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
  render();
}

render();
</script>

</body>
</html>
