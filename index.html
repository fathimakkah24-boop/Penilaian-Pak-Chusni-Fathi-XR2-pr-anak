<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Jadwal PR Anak</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-b from-blue-200 to-white min-h-screen flex justify-center p-6">

  <!-- CONTAINER UTAMA -->
  <div class="flex gap-6 items-start">

    <!-- ILUSTRASI KIRI -->
    <div class="hidden md:flex flex-col gap-4">
      <img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png" class="w-24">
      <img src="https://cdn-icons-png.flaticon.com/512/1995/1995574.png" class="w-24">
    </div>

    <!-- KONTEN UTAMA -->
    <div class="flex flex-col items-center">

      <h1 class="text-4xl font-bold text-blue-700 mb-4 text-center">
        📚 Jadwal PR Anak SD
      </h1>

      <!-- Ilustrasi Tengah -->
      <img src="https://cdn-icons-png.flaticon.com/512/3468/3468371.png" class="w-44 mb-4">

      <div class="bg-white shadow-xl rounded-2xl p-4 w-full max-w-md">

        <!-- Judul PR -->
        <input id="taskInput" class="w-full border rounded-xl px-3 py-2 mb-2" placeholder="Judul PR...">

        <!-- Deskripsi -->
        <textarea id="descInput" class="w-full border rounded-xl px-3 py-2 mb-2" placeholder="Deskripsi PR..."></textarea>

        <!-- Mata Pelajaran -->
        <select id="subject" class="w-full border rounded-xl px-3 py-2 mb-2">
          <option>📘 Matematika</option>
          <option>📖 Bahasa Indonesia</option>
          <option>🔬 IPA</option>
          <option>🌍 IPS</option>
          <option>🎨 Seni</option>
          <option>🏃 Olahraga</option>
        </select>

        <!-- Deadline -->
        <input type="date" id="deadline" class="w-full border rounded-xl px-3 py-2 mb-2">

        <button onclick="addTask()" class="w-full bg-blue-500 text-white py-2 rounded-xl">
          Tambah PR
        </button>

        <!-- List -->
        <ul id="taskList" class="mt-4 space-y-2"></ul>

      </div>

      <p class="mt-6 text-blue-600 text-center">
        🎉 Semangat belajar ya!
      </p>

      <p class="mt-2 text-sm text-gray-600">
        Dibuat oleh: <b>Fathi Ahmad - Absen 10</b>
      </p>

    </div>

    <!-- ILUSTRASI KANAN -->
    <div class="hidden md:flex flex-col gap-4">
      <img src="https://cdn-icons-png.flaticon.com/512/2922/2922561.png" class="w-24">
      <img src="https://cdn-icons-png.flaticon.com/512/201/201818.png" class="w-24">
    </div>

  </div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks") || "[]");

function getRemainingDays(deadline) {
  const today = new Date();
  const due = new Date(deadline);

  today.setHours(0,0,0,0);
  due.setHours(0,0,0,0);

  const diff = (due - today) / (1000 * 60 * 60 * 24);

  if (diff === 0) return {text: "⏰ Hari ini!", color: "text-red-600"};
  if (diff === 1) return {text: "⚠️ Besok!", color: "text-orange-500"};
  if (diff > 0) return {text: `⏳ ${diff} hari lagi`, color: "text-blue-700"};
  return {text: `❌ Terlambat ${Math.abs(diff)} hari`, color: "text-gray-500"};
}

function sortTasks() {
  tasks.sort((a, b) => new Date(a.deadline) - new Date(b.deadline));
}

function render() {
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  sortTasks();

  tasks.forEach((task, i) => {
    const remain = getRemainingDays(task.deadline);

    list.innerHTML += `
      <li class="bg-blue-100 p-3 rounded-xl">
        <div class="flex justify-between">
          <span class="font-semibold">✏️ ${task.text}</span>
          <button onclick="deleteTask(${i})">❌</button>
        </div>
        <div class="text-sm text-gray-700 mt-1">
          ${task.desc}
        </div>
        <div class="text-sm text-gray-600 mt-1">
          📘 ${task.subject} | 📅 ${task.deadline}
        </div>
        <div class="text-sm font-semibold ${remain.color}">
          ${remain.text}
        </div>
      </li>
    `;
  });
}

function addTask() {
  const text = document.getElementById("taskInput").value;
  const desc = document.getElementById("descInput").value;
  const subject = document.getElementById("subject").value;
  const deadline = document.getElementById("deadline").value;

  if (!text || !deadline) {
    alert("Isi judul PR dan deadline dulu ya!");
    return;
  }

  tasks.push({ text, desc, subject, deadline });
  save();

  document.getElementById("taskInput").value = "";
  document.getElementById("descInput").value = "";
}

function deleteTask(i) {
  tasks.splice(i, 1);
  save();
}

function save() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
  render();
}

render();
</script>

</body>
</html>
